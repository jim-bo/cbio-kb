project:
  type: website
  output-dir: _site
  resources:
    - "_schema/**"
    - "ask-chat.js"
    - "ask-chat.css"
    - "ask-graph.js"
    - "ask-graph.css"
    - "graph.json"
    - "vendor-d3.min.js"
    - "vendor-marked.min.js"
    - "site-styles.css"
    - "experiments/explorer-graph.js"
    - "experiments/explorer.js"
    - "experiments/explorer.css"
    - "experiments/explorer/**"
    - "experiments/plots/**"

validate-yaml: false

website:
  title: "cbio-kb"
  description: "Agent-maintained knowledge base over cBioPortal publications"
  repo-url: https://github.com/jim-bo/cbio-kb
  repo-actions: [edit, source]
  navbar:
    left:
      - href: index.md
        text: Home
      - href: papers/index.qmd
        text: Papers
      - href: genes/index.qmd
        text: Genes
      - href: cancer_types/index.qmd
        text: Cancers
      - href: datasets/index.qmd
        text: Datasets
      - href: drugs/index.qmd
        text: Drugs
      - href: methods/index.qmd
        text: Methods
      - href: themes/index.qmd
        text: Themes
      - href: experiments/index.qmd
        text: Experiments
      - href: ask.qmd
        text: Ask
  search:
    type: overlay

format:
  html:
    theme: cosmo
    css: site-styles.css
    toc: true
    code-copy: true
    link-external-newwindow: true
