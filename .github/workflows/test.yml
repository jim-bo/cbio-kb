name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv sync --extra dev
      - run: uv run pytest -v
      - run: uv run cbio-kb lint --wiki-dir wiki --allow-orphans
      - run: uv run cbio-kb crosslink --dry-run --wiki-dir wiki
