# cbio-kb RAG-vs-agentic evaluation question set v1
#
# 50 questions × 4 categories × 3 splits (train=30, val=10, test=10).
# Each question is grounded in at least one of the 56 corpus PMIDs
# (see eval/corpus_pmids.txt). `gold_pmids` is the minimal set a correct
# answer should cite; for `list` questions it is the comprehensive
# expected set (retrieval recall computed against it).
#
# Categories:
#   lookup     — single specific fact, 1–2 papers
#   list       — enumerate papers or entities matching criteria
#   synthesis  — cross-paper reasoning, contradictions, or theme-level claims
#   definition — explain a method, gene, dataset, or concept
#
# Splits:
#   train — tune prompts, chunk size, k
#   val   — select final config
#   test  — report numbers only (do not peek during dev)

version: 1
authored_on: 2026-04-16
corpus: eval/corpus_pmids.txt

questions:

  # ======================================================================
  # LOOKUP (15)
  # ======================================================================

  - id: L01
    category: lookup
    split: train
    question: >
      In the MSK-CHORD study, what percentage of lung adenocarcinoma
      patients harbored SETD2 driver mutations?
    gold_pmids: [39506116]
    gold_entities: [SETD2, LUAD]
    notes: Answer ~3% (204 of 5,957 LUAD patients).

  - id: L02
    category: lookup
    split: train
    question: >
      In the radiation-associated sarcoma cohort, which driver alteration
      dominates RT-angiosarcoma of the breast/chest wall, and at what
      frequency?
    gold_pmids: [37350195]
    gold_entities: [MYC, ANGS]
    notes: MYC amplification, 87% of 38 breast cases (75% of all 40 RT-AS).

  - id: L03
    category: lookup
    split: train
    question: >
      In the ADC radiosensitization study, what tumor doubling-time
      increase was observed in HER2-positive OE19 xenografts receiving
      T-DM1 combined with 2.5 Gy x 3 radiation?
    gold_pmids: [27698471]
    gold_entities: [ERBB2, trastuzumab, ado-trastuzumab-emtansine]
    notes: Doubling time increased from 7 to 66 days.

  - id: L04
    category: lookup
    split: train
    question: >
      In the ROBIN consortium preclinical data, which dietary intervention
      unexpectedly promoted radio-resistance?
    gold_pmids: [41941260]
    gold_entities: []
    notes: Ketogenic diet.

  - id: L05
    category: lookup
    split: train
    question: >
      What four CT radiomic features make up the Aerts prognostic
      signature trained on NSCLC Lung1/MAASTRO?
    gold_pmids: [24892406]
    gold_entities: [radiomic-signature-4-feature]
    notes: Statistics Energy, Shape Compactness, Grey Level Nonuniformity, wavelet Grey Level Nonuniformity HLH.

  - id: L06
    category: lookup
    split: train
    question: >
      In the phase 2 MIRT + nivolumab trial for recurrent HNSCC, what was
      the 1-year progression-free survival rate?
    gold_pmids: [38780927]
    gold_entities: [nivolumab, HNSC, imrt-reirradiation]
    notes: 61.7%, vs historical 43.8% (log-rank P=0.002).

  - id: L07
    category: lookup
    split: train
    question: >
      What targeted therapy is the subject of the FGFR3-altered urothelial
      carcinoma real-world outcomes study?
    gold_pmids: [37682528]
    gold_entities: [erdafitinib, FGFR3, BLCA, UTUC]
    notes: Erdafitinib.

  - id: L08
    category: lookup
    split: train
    question: >
      In the peripheral T-cell lymphoma CHOP-based chemotherapy cohort,
      which mutation identified high-risk events?
    gold_pmids: [37078708]
    gold_entities: [TP53, PTCL]
    notes: TP53.

  - id: L09
    category: lookup
    split: train
    question: >
      In the appendiceal adenocarcinoma molecular classification, which
      two RAS-pathway genes co-drive the mucinous subtype?
    gold_pmids: [36493333]
    gold_entities: [KRAS, GNAS, APAD]
    notes: KRAS and GNAS.

  - id: L10
    category: lookup
    split: val
    question: >
      What concordance index did the Aerts four-feature CT radiomic
      signature achieve on the HNSCC H&N1 MAASTRO validation cohort?
    gold_pmids: [24892406]
    gold_entities: [radiomic-signature-4-feature, HNSC]
    notes: C-index 0.69 (P=7.99e-7).

  - id: L11
    category: lookup
    split: val
    question: >
      How many patients were included in the MSK-CHORD harmonized
      clinicogenomic dataset?
    gold_pmids: [39506116]
    gold_entities: []
    notes: 24,950 patients.

  - id: L12
    category: lookup
    split: val
    question: >
      In the GLASS consortium study of IDH-mutant gliomas, what fraction
      of GCIMP-high tumors progressed to GCIMP-low in the treated group
      versus the untreated group?
    gold_pmids: [38117484]
    gold_entities: [IDH1, DIFG]
    notes: 34% treated vs 4% untreated; 10/29 vs 1/27; Fisher P=0.005.

  - id: L13
    category: lookup
    split: test
    question: >
      In the NSCLC brain metastasis study, which osimertinib-treated
      EGFR-mutant population was examined for CNS penetrance?
    gold_pmids: [37591896]
    gold_entities: [EGFR, osimertinib, LUAD]
    notes: bm_nsclc_mskcc_2023 cohort.

  - id: L14
    category: lookup
    split: test
    question: >
      In the extremity rhabdomyosarcoma study, which fusion gene pair
      defines the alveolar (ARMS) subtype?
    gold_pmids: [37315267]
    gold_entities: [PAX3, PAX7, FOXO1, ARMS]
    notes: PAX3-FOXO1 or PAX7-FOXO1.

  - id: L15
    category: lookup
    split: test
    question: >
      In the pleural mesothelioma near-haploidization study, what
      chromosomal signature defined the newly recognized subset?
    gold_pmids: [38630790]
    gold_entities: [PLMESO, BAP1, NF2]
    notes: Genomic near-haploidization (chromosome-scale LOH with one-copy loss).

