  # ======================================================================
  # SYNTHESIS (15)
  # ======================================================================

  - id: S01
    category: synthesis
    split: train
    question: >
      Where in the corpus do papers disagree about whether a CT radiomic
      signature generalizes across institutions for head-and-neck cancer
      prognosis? Summarize both sides.
    gold_pmids: [24892406, 37397861]
    gold_entities: [radiomic-signature-4-feature, HNSC]
    notes: Aerts positive cross-cohort (H&N1/H&N2); Kazmierski/RADCURE mostly negative, deep radiomics underperformed EMR+volume.

  - id: S02
    category: synthesis
    split: train
    question: >
      How do the corpus papers characterize the long-term molecular
      sequelae of radiotherapy on previously-irradiated tissue?
    gold_pmids: [37350195, 38117484]
    gold_entities: [MYC, IDH1, CDKN2A]
    notes: RT-associated sarcomas have histotype-specific drivers (MYC-amp breast RT-AS); IDH-mut gliomas show hypomethylation, GCIMP-high→low, CDKN2A loss at recurrence.

  - id: S03
    category: synthesis
    split: train
    question: >
      Across the corpus trials of PD-1 or PD-L1 blockade, what biomarkers
      of response appear, and do they agree across disease sites?
    gold_pmids: [37406106, 38653864, 38780927, 38949888, 38995739]
    gold_entities: [CD274, PDCD1, MSH2, MSH6, MLH1]
    notes: MSI/dMMR positive in gyn cancers and prostate; PD-L1 CPS divergent in HNSC reirradiation (P=0.86) vs recurrent/metastatic; TMB inconsistent signal.

  - id: S04
    category: synthesis
    split: train
    question: >
      What evidence across the corpus links DNA-damage-response biology
      to aggressive or treatment-refractory phenotypes in multiple tumor
      types?
    gold_pmids: [34493726, 37350195, 38488813, 39386723]
    gold_entities: [BRCA1, BRCA2, ATM, MYCN]
    notes: NBL nC3 DDR/cell-cycle enrichment; NEPC PDX DDR clustering; RT-sarcoma DNA repair signatures; HGSOC precursor IRDS/cGAS-STING axis.

  - id: S05
    category: synthesis
    split: train
    question: >
      Across the ctDNA papers in the corpus, what common utilities emerge,
      and where do the approaches differ in clinical question?
    gold_pmids: [36357680, 37769223, 39147831, 39289779]
    gold_entities: [ctdna-dynamics]
    notes: Therapy-guidance (NSCLC), liquid biopsy profiling (HCC), thromboembolism prediction (VTE), CNS tumor CSF dynamics.

  - id: S06
    category: synthesis
    split: train
    question: >
      Across the lymphoma papers in the corpus (CLL, Hodgkin, DLBCL,
      PTCL, PCNSL), what common themes emerge about how genomic
      subclassification informs clinical stratification?
    gold_pmids: [35927489, 36723991, 37078708, 38497151, 38995739]
    gold_entities: [TP53, MYD88, CD79B, BCL2]
    notes: LymphGen / genomic subtypes refine risk; TP53/MYD88/CD79B as cross-disease risk markers.

  - id: S07
    category: synthesis
    split: train
    question: >
      What does the corpus say about the role of tumor volume as a
      baseline against which imaging-derived models must prove
      incremental prognostic value?
    gold_pmids: [24892406, 35764743, 37397861]
    gold_entities: [radiomics, HNSC, HGSOC]
    notes: Volume is hard to beat; radiomics typically adds value only in combination; deep CNN embeddings dropped AUROC vs volume.

  - id: S08
    category: synthesis
    split: train
    question: >
      How do the two rhabdomyosarcoma papers in the corpus differ in
      their genomic findings and clinical framing?
    gold_pmids: [37315267, 37730754]
    gold_entities: [PAX3, PAX7, FOXO1, RMS]
    notes: 37315267 is extremity-focused risk stratification; 37730754 is longitudinal multi-sample evolution.

  - id: S09
    category: synthesis
    split: train
    question: >
      Across the corpus, what evidence links environmental radiation or
      UV exposure to acquired somatic alterations or epigenetic drift?
    gold_pmids: [37350195, 38117484, 38895302, 39091884]
    gold_entities: [TP53, NF1, CDKN2A]
    notes: RT-sarcoma; treated IDH glioma hypomethylation; tanning UV mutagenesis; cSCC keratinocyte evolution.

  - id: S10
    category: synthesis
    split: val
    question: >
      How does the corpus characterize molecular disparities by race or
      ancestry in cancer genomics?
    gold_pmids: [37651310]
    gold_entities: [UCEC, TP53, CCNE1, PTEN]
    notes: Endometrial carcinoma disparities (Black vs White) — TP53/CCNE1 over-represented, actionable therapeutic implications.

  - id: S11
    category: synthesis
    split: val
    question: >
      What limitations of PD-L1 (CD274) combined positive score as a
      predictive biomarker emerge across the corpus?
    gold_pmids: [37406106, 38780927]
    gold_entities: [CD274, PDCD1]
    notes: MIRT+nivolumab no stratification (P=0.86 PFS); combined HER2+PD-1 EGC suggests variable prediction by context.

  - id: S12
    category: synthesis
    split: val
    question: >
      What role does clonal hematopoiesis play in interpreting ctDNA or
      cfDNA findings according to the corpus?
    gold_pmids: [38147626]
    gold_entities: [DNMT3A, TET2, JAK2, TP53, msk_ch_2023]
    notes: CH-related alterations (DNMT3A, TET2, JAK2, ASXL1, TP53) are a false-positive source in ctDNA; high-risk genotypes identified in non-heme cancer patients.

  - id: S13
    category: synthesis
    split: test
    question: >
      How does the corpus address the use of real-world data and NLP
      to augment structured genomic data for outcome prediction?
    gold_pmids: [39506116]
    gold_entities: [nlp-prissmm, msk_chord_2024]
    notes: MSK-CHORD integrates NLP-derived features with structured data; improves OS prediction over stage/genomics alone.

  - id: S14
    category: synthesis
    split: test
    question: >
      Beyond breast and ovarian cancer, where does the corpus document
      BRCA1/BRCA2 alterations or HR-pathway involvement?
    gold_pmids: [34493726, 37769223, 38412093, 38488813, 38949888, 39386723]
    gold_entities: [BRCA1, BRCA2]
    notes: High-risk NBL nC3 cluster; HCC ctDNA; anaplastic thyroid; prostate PDX; prostate MSI+HR deficiency; HGSOC precursor.

  - id: S15
    category: synthesis
    split: test
    question: >
      Across the corpus, what consistent findings emerge about DDR or
      BRCA1/BRCA2 expression and outcomes in aggressive pediatric or
      young-adult cancers?
    gold_pmids: [34493726, 37315267, 37730754]
    gold_entities: [BRCA1, BRCA2, MYCN, NBL, RMS]
    notes: nC3 high-risk NBL cluster over-expresses BRCA1/BRCA2/MYCN; pediatric sarcoma genomic evolution context.

  # ======================================================================
  # DEFINITION (10)
  # ======================================================================

  - id: D01
    category: definition
    split: train
    question: >
      What is the MSK-IMPACT panel, and what are its main panel versions
      referenced in the corpus?
    gold_pmids: [37591896, 37078708, 38922339]
    gold_entities: [msk-impact-panel, IMPACT341, IMPACT410, IMPACT468, IMPACT505]
    notes: Targeted hybridization-capture NGS assay; versions 341/410/468/505 (gene count).

  - id: D02
    category: definition
    split: train
    question: >
      Describe each of the four features in the Aerts CT radiomic
      signature and what aspect of tumor phenotype they capture.
    gold_pmids: [24892406]
    gold_entities: [radiomic-signature-4-feature]
    notes: Statistics Energy (intensity), Shape Compactness (shape), two GLN (heterogeneity).

  - id: D03
    category: definition
    split: train
    question: >
      What is the PRISSMM NLP curation framework and how is it used in
      the MSK-CHORD study?
    gold_pmids: [39506116]
    gold_entities: [nlp-prissmm]
    notes: NLP annotation of pathology/radiology/clinician notes; labeled ground truth from Project GENIE BPC.

  - id: D04
    category: definition
    split: train
    question: >
      What is the LymphGen classification system, and how was it
      validated in the corpus?
    gold_pmids: [38497151]
    gold_entities: [lymphgen, DLBCLNOS]
    notes: Genetic subtype classifier for DLBCL (MCD, BN2, N1, EZB, ST2); validated on MSK 400-gene clinical NGS panel.

  - id: D05
    category: definition
    split: train
    question: >
      What is the ROBIN consortium, what projects does it run, and which
      diseases does it cover?
    gold_pmids: [41941260]
    gold_entities: []
    notes: U54 consortium of 5 Molecular Characterization Trials — OligoMET (PRAD), ImmunoRad (READ), GenRad (BLCA+HNSC), METEOR (CESC+PAAD), KIDSROBIN (DMG+NBL).

  - id: D06
    category: definition
    split: train
    question: >
      How is homologous-recombination deficiency (HRD) characterized in
      the HGSOC multimodal risk-stratification paper?
    gold_pmids: [35764743]
    gold_entities: [BRCA1, BRCA2, HGSOC, sigma-mutational-signatures]
    notes: HRD status via BRCA1/2 + genomic scar signatures; part of late-fusion Cox model.

  - id: D07
    category: definition
    split: val
    question: >
      What is the GLASS consortium and what does its IDH-mutant glioma
      methylation analysis contribute to the corpus?
    gold_pmids: [38117484]
    gold_entities: [IDH1, DIFG]
    notes: Longitudinal matched primary-recurrent glioma; characterizes methylation drift post-treatment.

  - id: D08
    category: definition
    split: val
    question: >
      What is the Hidden-Genome Classifier introduced in the
      cholangiocarcinoma paper?
    gold_pmids: [38864854]
    gold_entities: [IHCH, EHCH, HCC]
    notes: A classifier for quantifying intrahepatic cholangiocarcinoma heterogeneity using genomic features.

  - id: D09
    category: definition
    split: test
    question: >
      What defines a radiation-associated sarcoma clinically, and which
      histotypes does the corpus examine?
    gold_pmids: [37350195]
    gold_entities: [ANGS, MPNST, MFH, OS]
    notes: "Histotypes: RT-AS, RT-MPNST, RT-UPS/MFH, RT-OS. Latency varies 8-18.5 years."

  - id: D10
    category: definition
    split: test
    question: >
      What is the RADCURE dataset, how large is it, and what makes it
      distinctive compared with earlier public HNSCC imaging resources?
    gold_pmids: [38362943, 37397861]
    gold_entities: [radcure, HNSC]
    notes: 3,346 HNSCC planning CTs with standardized RTSTRUCT nomenclature, 5-year median follow-up; largest public HNSCC RT resource.
