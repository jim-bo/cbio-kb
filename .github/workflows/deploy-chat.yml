name: Deploy chat API to Cloud Run

# Deploys the cbio-kb FastAPI chat service (ai_search/) to Cloud Run.
# Static Quarto site is published separately by publish-site.yml.

on:
  push:
    branches: [main]
    paths:
      - "ai_search/**"
      - "src/**"
      - "wiki/**.md"       # raw markdown the agent reads at runtime
      - "wiki/_schema/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile.chat"
      - ".dockerignore"
      - ".github/workflows/deploy-chat.yml"
  workflow_dispatch:

concurrency:
  group: deploy-chat
  cancel-in-progress: false

env:
  PROJECT_ID: cbioportal-python
  REGION: us-central1
  SERVICE: cbio-kb-api
  REPO: cbio-kb
  # github.io origin for CORS — override the repo secret CHAT_CORS_ORIGINS
  # if your Pages URL differs.
  DEFAULT_CORS: "https://jim-bo.github.io,http://localhost:8080,http://127.0.0.1:8080"

jobs:
  deploy:
    name: Build image and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Derive image tag from commit SHA
        id: tag
        run: echo "IMAGE_URI=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${SERVICE}:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build image via Cloud Build
        run: |
          gcloud builds submit \
            --project="${PROJECT_ID}" \
            --config=cloudbuild-chat.yaml \
            --substitutions="_IMAGE_URI=${{ steps.tag.outputs.IMAGE_URI }}"

      - name: Deploy to Cloud Run
        run: |
          set -euo pipefail
          CORS_ORIGINS="${{ secrets.CHAT_CORS_ORIGINS || env.DEFAULT_CORS }}"
          gcloud run deploy "${SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${{ steps.tag.outputs.IMAGE_URI }}" \
            --platform=managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=300 \
            --concurrency=20 \
            --port=8080 \
            --set-env-vars="^|^SESSION_STORE=firestore|GOOGLE_CLOUD_PROJECT=${PROJECT_ID}|CHAT_CORS_ORIGINS=${CORS_ORIGINS}" \
            --update-secrets="ANTHROPIC_API_KEY=anthropic-api-key:latest"

      - name: Print service URL
        run: |
          URL="$(gcloud run services describe "${SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --format='value(status.url)')"
          echo "Deployed: ${URL}"
          echo "API:      ${URL}/api/chat"
          echo "### Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Service: \`${SERVICE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.tag.outputs.IMAGE_URI }}\`" >> "$GITHUB_STEP_SUMMARY"
